[package]
name = "minisqlite"
version = "0.3.0-alpha.1"
edition = "2021"
authors = ["Kartik Kabadi <kartik@kartikkabadi.com>"]
description = "An embedded append-only control-plane state engine for local-first AI applications"
readme = "README.md"
license = "MIT"
repository = "https://github.com/kartikkabadi/minisqlite"
homepage = "https://github.com/kartikkabadi/minisqlite"
documentation = "https://docs.rs/minisqlite"
keywords = ["database", "embedded", "eventsourcing", "control-plane", "local-first"]
categories = ["database-implementations"]
exclude = ["fuzz"]

[[bin]]
name = "minisqlite"
path = "src/main.rs"
required-features = ["json"]

[[bin]]
name = "crash_driver"
path = "src/bin/crash_driver.rs"
required-features = ["failpoint"]

[dependencies]
crc32fast = "1.4.2"
fs2 = "0.4.3"

[dependencies.serde]
version = "1.0"
optional = true
features = ["derive"]

[dependencies.serde_json]
version = "1.0.140"
optional = true

[dev-dependencies]
proptest = "=1.5.0"
tempfile = "=3.14.0"

[features]
default = ["json"]
json = ["serde", "dep:serde_json"]
serde = ["dep:serde"]
failpoint = []
